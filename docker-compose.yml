services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: cudly-postgres
    environment:
      POSTGRES_DB: cudly
      POSTGRES_USER: cudly
      POSTGRES_PASSWORD: cudly_local_dev
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Note: Migrations are handled by the app via golang-migrate (DB_AUTO_MIGRATE=true)
      # Do NOT mount to docker-entrypoint-initdb.d as it conflicts with golang-migrate
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cudly"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cudly-network

  # CUDly application (development mode)
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: cudly-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cudly
      DB_USER: cudly
      DB_PASSWORD: cudly_local_dev
      DB_SSL_MODE: disable
      DB_AUTO_MIGRATE: "true"
      DB_MIGRATIONS_PATH: /app/internal/database/postgres/migrations

      # Secret provider (use aws with empty credentials for local dev)
      SECRET_PROVIDER: aws
      # Email disabled for local development (no SNS topic)
      EMAIL_ENABLED: "false"

      # Application settings
      ENVIRONMENT: development
      LOG_LEVEL: debug

      # AWS configuration (if needed for testing)
      AWS_REGION: us-east-1
      # AWS_PROFILE: default # Uncomment if using AWS profiles

    ports:
      - "8080:8080"
    volumes:
      # Mount source code for hot reload
      - .:/app
      # Cache Go modules
      - go_modules:/go/pkg/mod
    networks:
      - cudly-network
    command: air # Use Air for hot reload in development

  # Frontend (nginx with reverse proxy to backend)
  frontend:
    image: nginx:alpine
    container_name: cudly-frontend
    depends_on:
      - app
    ports:
      - "3001:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./scripts/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - cudly-network

  # pgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cudly-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cudly.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - cudly-network
    depends_on:
      - postgres
    profiles:
      - tools # Only start with: docker-compose --profile tools up

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  go_modules:
    driver: local

networks:
  cudly-network:
    driver: bridge
