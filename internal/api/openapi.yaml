openapi: 3.0.3
info:
  title: CUDly API
  description: >
    CUDly is a multi-cloud commitment (Reserved Instances, Savings Plans)
    purchase automation and cost-optimization dashboard.
  version: "1.0.0"
  license:
    name: Proprietary

servers:
  - url: /
    description: Same-origin (relative)

# ---------------------------------------------------------------------------
# Security schemes
# ---------------------------------------------------------------------------
security:
  - bearerAuth: []

tags:
  - name: Dashboard
  - name: Configuration
  - name: Credentials
  - name: Recommendations
  - name: Plans
  - name: Purchases
  - name: PlannedPurchases
  - name: History
  - name: Analytics
  - name: Auth
  - name: APIKeys
  - name: Users
  - name: Groups
  - name: Health
  - name: Info
  - name: Docs

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  # ---- Dashboard ----------------------------------------------------------
  /api/dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [Dashboard]
      summary: Get dashboard summary
      parameters:
        - name: provider
          in: query
          description: Filter by cloud provider (aws, azure, gcp)
          schema:
            type: string
            enum: [aws, azure, gcp]
        - $ref: '#/components/parameters/AccountID'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/dashboard/upcoming:
    get:
      operationId: getUpcomingPurchases
      tags: [Dashboard]
      summary: Get upcoming scheduled purchases
      responses:
        '200':
          description: Upcoming purchases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpcomingPurchaseResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---- Configuration ------------------------------------------------------
  /api/config:
    get:
      operationId: getConfig
      tags: [Configuration]
      summary: Get full configuration
      responses:
        '200':
          description: Current configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      operationId: updateConfig
      tags: [Configuration]
      summary: Update global configuration
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GlobalConfig'
      responses:
        '200':
          description: Updated configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/config/service/{service}:
    parameters:
      - name: service
        in: path
        required: true
        schema:
          type: string
          enum: [ec2, rds, elasticache, opensearch]
    get:
      operationId: getServiceConfig
      tags: [Configuration]
      summary: Get per-service configuration
      responses:
        '200':
          description: Service configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceConfig'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateServiceConfig
      tags: [Configuration]
      summary: Update per-service configuration
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceConfig'
      responses:
        '200':
          description: Updated service configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceConfig'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---- Recommendations ----------------------------------------------------
  /api/recommendations:
    get:
      operationId: getRecommendations
      tags: [Recommendations]
      summary: List commitment purchase recommendations
      parameters:
        - name: provider
          in: query
          description: Filter by cloud provider (aws, azure, gcp)
          schema:
            type: string
            enum: [aws, azure, gcp]
        - name: service
          in: query
          schema:
            type: string
        - name: region
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/AccountID'
      responses:
        '200':
          description: Recommendations list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/recommendations/refresh:
    post:
      operationId: refreshRecommendations
      tags: [Recommendations]
      summary: Trigger a fresh collection of recommendations from cloud providers
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '200':
          description: Collection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectResult'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---- Purchase Plans -----------------------------------------------------
  /api/plans:
    get:
      operationId: listPlans
      tags: [Plans]
      summary: List purchase plans
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/AccountID'
      responses:
        '200':
          description: Plans list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlansResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createPlan
      tags: [Plans]
      summary: Create a purchase plan
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanRequest'
      responses:
        '200':
          description: Created plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchasePlan'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/plans/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceID'
    get:
      operationId: getPlan
      tags: [Plans]
      summary: Get a purchase plan by ID
      responses:
        '200':
          description: Purchase plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchasePlan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updatePlan
      tags: [Plans]
      summary: Replace a purchase plan
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanRequest'
      responses:
        '200':
          description: Updated plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchasePlan'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: patchPlan
      tags: [Plans]
      summary: Partially update a purchase plan
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanRequest'
      responses:
        '200':
          description: Patched plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchasePlan'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deletePlan
      tags: [Plans]
      summary: Delete a purchase plan
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/plans/{id}/purchases:
    parameters:
      - $ref: '#/components/parameters/ResourceID'
    post:
      operationId: createPlannedPurchases
      tags: [Plans]
      summary: Generate planned purchase executions for a plan
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlannedPurchasesRequest'
      responses:
        '200':
          description: Planned purchases created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePlannedPurchasesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---- Purchase Actions ---------------------------------------------------
  /api/purchases/execute:
    post:
      operationId: executePurchase
      tags: [Purchases]
      summary: Create a purchase execution from selected recommendations
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutePurchaseRequest'
      responses:
        '200':
          description: Execution created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutePurchaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/purchases/approve/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceID'
    post:
      operationId: approvePurchase
      tags: [Purchases]
      summary: Approve a pending purchase execution
      description: >
        Token-based approval; does not require session auth or CSRF.
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/purchases/cancel/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceID'
    post:
      operationId: cancelPurchase
      tags: [Purchases]
      summary: Cancel a pending purchase execution
      description: >
        Token-based cancellation; does not require session auth or CSRF.
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ---- Planned Purchases --------------------------------------------------
  /api/purchases/planned:
    get:
      operationId: getPlannedPurchases
      tags: [PlannedPurchases]
      summary: List planned (scheduled) purchases
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: plan_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Planned purchases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlannedPurchasesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/purchases/planned/{id}/pause:
    parameters:
      - $ref: '#/components/parameters/ResourceID'
    post:
      operationId: pausePlannedPurchase
      tags: [PlannedPurchases]
      summary: Pause a planned purchase
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '200':
          description: Paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/purchases/planned/{id}/resume:
    parameters:
      - $ref: '#/components/parameters/ResourceID'
    post:
      operationId: resumePlannedPurchase
      tags: [PlannedPurchases]
      summary: Resume a paused planned purchase
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '200':
          description: Resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/purchases/planned/{id}/run:
    parameters:
      - $ref: '#/components/parameters/ResourceID'
    post:
      operationId: runPlannedPurchase
      tags: [PlannedPurchases]
      summary: Immediately execute a planned purchase
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '200':
          description: Execution initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunPurchaseResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/purchases/planned/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceID'
    delete:
      operationId: deletePlannedPurchase
      tags: [PlannedPurchases]
      summary: Cancel and delete a planned purchase
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '200':
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---- Generic Purchase Details -------------------------------------------
  /api/purchases/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceID'
    get:
      operationId: getPurchaseDetails
      tags: [Purchases]
      summary: Get details of a specific purchase execution
      responses:
        '200':
          description: Purchase execution details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseExecution'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---- History ------------------------------------------------------------
  /api/history:
    get:
      operationId: getHistory
      tags: [History]
      summary: Get purchase history
      parameters:
        - $ref: '#/components/parameters/AccountID'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
        - name: interval
          in: query
          schema:
            type: string
            enum: [hourly, daily, weekly, monthly]
      responses:
        '200':
          description: Purchase history with summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/history/analytics:
    get:
      operationId: getHistoryAnalytics
      tags: [History]
      summary: Get time-series analytics for purchase history
      parameters:
        - $ref: '#/components/parameters/AccountID'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
      responses:
        '200':
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/history/breakdown:
    get:
      operationId: getHistoryBreakdown
      tags: [History]
      summary: Get savings breakdown by dimension
      parameters:
        - $ref: '#/components/parameters/AccountID'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
        - name: dimension
          in: query
          schema:
            type: string
            enum: [service, provider, region]
            default: service
      responses:
        '200':
          description: Breakdown data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BreakdownResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---- Analytics ----------------------------------------------------------
  /api/analytics/collect:
    post:
      operationId: triggerAnalyticsCollection
      tags: [Analytics]
      summary: Trigger manual analytics data collection (admin only)
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '200':
          description: Collection completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusMessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---- Auth ---------------------------------------------------------------
  /api/auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: Authenticate and obtain a session token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      summary: Invalidate current session
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/me:
    get:
      operationId: getCurrentUser
      tags: [Auth]
      summary: Get the currently authenticated user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/check-admin:
    get:
      operationId: checkAdminExists
      tags: [Auth]
      summary: Check whether an admin account has been set up
      security: []
      responses:
        '200':
          description: Admin existence status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminExistsResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/auth/setup-admin:
    post:
      operationId: setupAdmin
      tags: [Auth]
      summary: Create the initial admin account (first-run only)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetupAdminRequest'
      responses:
        '200':
          description: Admin created and logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [Auth]
      summary: Request a password reset email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '200':
          description: >
            Always returns success to prevent email enumeration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/auth/reset-password:
    post:
      operationId: resetPassword
      tags: [Auth]
      summary: Confirm a password reset with a token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
      responses:
        '200':
          description: Password reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/auth/profile:
    put:
      operationId: updateProfile
      tags: [Auth]
      summary: Update the authenticated user's profile
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/change-password:
    post:
      operationId: changePassword
      tags: [Auth]
      summary: Change the authenticated user's password
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---- API Keys -----------------------------------------------------------
  /api/api-keys:
    get:
      operationId: listAPIKeys
      tags: [APIKeys]
      summary: List API keys for the current user
      responses:
        '200':
          description: API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/APIKeyInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createAPIKey
      tags: [APIKeys]
      summary: Create a new API key
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAPIKeyRequest'
      responses:
        '200':
          description: Newly created API key (full key shown only once)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAPIKeyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/api-keys/{id}/revoke:
    parameters:
      - $ref: '#/components/parameters/ResourceID'
    post:
      operationId: revokeAPIKey
      tags: [APIKeys]
      summary: Revoke (deactivate) an API key
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '200':
          description: Revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/api-keys/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceID'
    delete:
      operationId: deleteAPIKey
      tags: [APIKeys]
      summary: Permanently delete an API key
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---- User Management ----------------------------------------------------
  /api/users:
    get:
      operationId: listUsers
      tags: [Users]
      summary: List all users (admin only)
      responses:
        '200':
          description: Users list
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createUser
      tags: [Users]
      summary: Create a new user (admin only)
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
