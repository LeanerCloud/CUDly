# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:
  # ---- Security Schemes ---------------------------------------------------
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Session token returned by POST /api/auth/login
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key created via POST /api/api-keys

  # ---- Reusable Parameters ------------------------------------------------
  parameters:
    ResourceID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    AccountID:
      name: account_id
      in: query
      schema:
        type: string

    StartDate:
      name: start_date
      in: query
      description: RFC 3339 or YYYY-MM-DD
      schema:
        type: string
        format: date

    EndDate:
      name: end_date
      in: query
      description: RFC 3339 or YYYY-MM-DD
      schema:
        type: string
        format: date

    CSRFToken:
      name: X-CSRF-Token
      in: header
      required: true
      description: CSRF token from the login response
      schema:
        type: string

  # ---- Reusable Responses -------------------------------------------------
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  # ---- Schemas ------------------------------------------------------------
  schemas:
    # -- Generic ------------------------------------------------------------
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string

    StatusMessageResponse:
      type: object
      properties:
        status:
          type: string
        message:
          type: string

    # -- Auth ---------------------------------------------------------------
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          description: Base64-encoded password
        mfa_code:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/UserInfo'
        csrf_token:
          type: string

    UserInfo:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, user, readonly]
        groups:
          type: array
          items:
            type: string
        mfa_enabled:
          type: boolean

    SetupAdminRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    PasswordResetConfirm:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
        new_password:
          type: string

    ProfileUpdateRequest:
      type: object
      required: [email, current_password]
      properties:
        email:
          type: string
          format: email
        current_password:
          type: string
          description: Base64-encoded current password
        new_password:
          type: string
          description: Base64-encoded new password (optional)

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          description: Base64-encoded current password
        new_password:
          type: string
          description: Base64-encoded new password

    CurrentUserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
        mfa_enabled:
          type: boolean

    AdminExistsResponse:
      type: object
      properties:
        admin_exists:
          type: boolean

    # -- Users / Groups -----------------------------------------------------
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, user, readonly]
        groups:
          type: array
          items:
            type: string
        mfa_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          description: Base64-encoded password
        role:
          type: string
          enum: [admin, user, readonly]
        groups:
          type: array
          items:
            type: string

    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, user, readonly]
        groups:
          type: array
          items:
            type: string

    Group:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        allowed_accounts:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateGroupRequest:
      type: object
      required: [name, permissions]
      properties:
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        allowed_accounts:
          type: array
          items:
            type: string

    UpdateGroupRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        allowed_accounts:
          type: array
          items:
            type: string

    Permission:
      type: object
      required: [action, resource]
      properties:
        action:
          type: string
        resource:
          type: string
        constraints:
          $ref: '#/components/schemas/PermissionConstraint'

    PermissionConstraint:
      type: object
      properties:
        accounts:
          type: array
          items:
            type: string
        providers:
          type: array
          items:
            type: string
        services:
          type: array
          items:
            type: string
        regions:
          type: array
          items:
            type: string
        max_amount:
          type: number
          format: double

    # -- API Keys -----------------------------------------------------------
    CreateAPIKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        expires_at:
          type: string
          format: date-time

    CreateAPIKeyResponse:
      type: object
      properties:
        api_key:
          type: string
          description: Full key value (shown only once)
        key_id:
          type: string
        info:
          $ref: '#/components/schemas/APIKeyInfo'

    APIKeyInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        key_prefix:
          type: string
          description: First 8 characters for display
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
        is_active:
          type: boolean

    # -- Configuration ------------------------------------------------------
    ConfigResponse:
      type: object
      properties:
        global:
          $ref: '#/components/schemas/GlobalConfig'
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceConfig'

    GlobalConfig:
      type: object
      properties:
        enabled_providers:
          type: array
          items:
            type: string
            enum: [aws, azure, gcp]
        notification_email:
          type: string
          format: email
          nullable: true
        approval_required:
          type: boolean
        default_term:
          type: integer
          description: Term in years (1 or 3)
        default_payment:
          type: string
          enum: [no-upfront, partial-upfront, all-upfront]
        default_coverage:
          type: number
          format: double
          description: Target coverage percentage (0-100)
        default_ramp_schedule:
          type: string
          enum: [immediate, weekly-25pct, monthly-10pct, custom]

    ServiceConfig:
      type: object
      properties:
        provider:
          type: string
        service:
          type: string
        enabled:
          type: boolean
        term:
          type: integer
        payment:
          type: string
        coverage:
          type: number
          format: double
        ramp_schedule:
          type: string
        include_engines:
          type: array
          items:
            type: string
        exclude_engines:
          type: array
          items:
            type: string
        include_regions:
          type: array
          items:
            type: string
        exclude_regions:
          type: array
          items:
            type: string
        include_types:
          type: array
          items:
            type: string
        exclude_types:
          type: array
          items:
            type: string

    # -- Dashboard ----------------------------------------------------------
    DashboardSummary:
      type: object
      properties:
        potential_monthly_savings:
          type: number
          format: double
        total_recommendations:
          type: integer
        active_commitments:
          type: integer
        committed_monthly:
          type: number
          format: double
        current_coverage:
          type: number
          format: double
        target_coverage:
          type: number
          format: double
        ytd_savings:
          type: number
          format: double
        by_service:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ServiceSavings'

    ServiceSavings:
      type: object
      properties:
        potential_savings:
          type: number
          format: double
        current_savings:
          type: number
          format: double

    UpcomingPurchaseResponse:
      type: object
      properties:
        purchases:
          type: array
          items:
            $ref: '#/components/schemas/UpcomingPurchase'

    UpcomingPurchase:
      type: object
      properties:
        execution_id:
          type: string
        plan_name:
          type: string
        scheduled_date:
          type: string
          format: date
        provider:
          type: string
        service:
          type: string
        step_number:
          type: integer
        total_steps:
          type: integer
        estimated_savings:
          type: number
          format: double

    # -- Recommendations ----------------------------------------------------
    RecommendationsResponse:
      type: object
      properties:
        recommendations:
          type: array
          items:
            $ref: '#/components/schemas/RecommendationRecord'
        total_savings:
          type: number
          format: double
        count:
          type: integer

    RecommendationRecord:
      type: object
      properties:
        id:
          type: string
        provider:
          type: string
        service:
          type: string
        region:
          type: string
        resource_type:
          type: string
        engine:
          type: string
        count:
          type: integer
        term:
          type: integer
        payment:
          type: string
        upfront_cost:
          type: number
          format: double
        monthly_cost:
          type: number
          format: double
        savings:
          type: number
          format: double
        selected:
          type: boolean
        purchased:
          type: boolean
        purchase_id:
          type: string
        error:
          type: string

    CollectResult:
      type: object
      description: Result of a recommendation collection run
      properties:
        collected:
          type: integer
        errors:
          type: array
          items:
            type: string

    # -- Plans --------------------------------------------------------------
    PlansResponse:
      type: object
      properties:
        plans:
          type: array
          items:
            $ref: '#/components/schemas/PurchasePlan'

    PlanRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        auto_purchase:
          type: boolean
        notification_days_before:
          type: integer
        provider:
          type: string
        service:
          type: string
        term:
          type: integer
        payment:
          type: string
        target_coverage:
          type: integer
        ramp_schedule:
          type: string
          enum: [immediate, weekly-25pct, monthly-10pct, custom]
        custom_step_percent:
          type: integer
        custom_interval_days:
          type: integer

    PurchasePlan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        enabled:
          type: boolean
        auto_purchase:
          type: boolean
        notification_days_before:
          type: integer
        services:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ServiceConfig'
        ramp_schedule:
          $ref: '#/components/schemas/RampSchedule'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        next_execution_date:
          type: string
          format: date-time
          nullable: true
        last_execution_date:
          type: string
          format: date-time
          nullable: true
        last_notification_sent:
          type: string
          format: date-time
          nullable: true

    RampSchedule:
      type: object
      properties:
        type:
          type: string
          enum: [immediate, weekly, monthly, custom]
        percent_per_step:
          type: number
          format: double
        step_interval_days:
          type: integer
        current_step:
          type: integer
        total_steps:
          type: integer
        start_date:
          type: string
          format: date-time

    CreatePlannedPurchasesRequest:
      type: object
      properties:
        count:
          type: integer
        start_date:
          type: string
          format: date

    CreatePlannedPurchasesResponse:
      type: object
      properties:
        created:
          type: integer

    # -- Purchases ----------------------------------------------------------
    ExecutePurchaseRequest:
      type: object
      required: [recommendations]
      properties:
        recommendations:
          type: array
          items:
            $ref: '#/components/schemas/RecommendationRecord'
          minItems: 1
          maxItems: 1000

    ExecutePurchaseResponse:
      type: object
      properties:
        execution_id:
          type: string
          format: uuid
        status:
          type: string
        recommendation_count:
          type: integer
        total_upfront_cost:
          type: number
          format: double
        estimated_savings:
          type: number
          format: double
        message:
          type: string

    PurchaseExecution:
      type: object
      properties:
        execution_id:
          type: string
          format: uuid
        plan_id:
          type: string
        plan_name:
          type: string
        status:
          type: string
          enum: [pending, notified, approved, cancelled, completed, failed, running, paused]
        step_number:
          type: integer
        scheduled_date:
          type: string
          format: date
        total_upfront_cost:
          type: number
          format: double
        estimated_savings:
          type: number
          format: double
        recommendations:
          type: array
          items:
            $ref: '#/components/schemas/RecommendationRecord'
        notification_sent:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        error:
          type: string

    PlannedPurchasesResponse:
      type: object
      properties:
        purchases:
          type: array
          items:
            $ref: '#/components/schemas/PlannedPurchase'

    PlannedPurchase:
      type: object
      properties:
        id:
          type: string
          format: uuid
        plan_id:
          type: string
        plan_name:
          type: string
        scheduled_date:
          type: string
          format: date
        provider:
          type: string
        service:
          type: string
        resource_type:
          type: string
        region:
          type: string
        count:
          type: integer
        term:
          type: integer
        payment:
          type: string
        estimated_savings:
          type: number
          format: double
        upfront_cost:
          type: number
          format: double
        status:
          type: string
        step_number:
          type: integer
        total_steps:
          type: integer

    RunPurchaseResponse:
      type: object
      properties:
        execution_id:
          type: string
          format: uuid
        status:
          type: string
        message:
          type: string

    # -- History / Analytics ------------------------------------------------
    HistoryResponse:
      type: object
      properties:
        summary:
          $ref: '#/components/schemas/HistorySummary'
        purchases:
          type: array
          items:
            $ref: '#/components/schemas/PurchaseHistoryRecord'

    HistorySummary:
      type: object
      properties:
        total_purchases:
          type: integer
        total_upfront:
          type: number
          format: double
        total_monthly_savings:
