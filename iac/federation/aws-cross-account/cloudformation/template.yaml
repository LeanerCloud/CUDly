AWSTemplateFormatVersion: "2010-09-09"
Description: >
  IAM role for CUDly cross-account access. Deploy this in the target AWS account
  to allow CUDly running in a source AWS account to assume this role via
  sts:AssumeRole with an external ID (confused-deputy protection).

Parameters:
  SourceAccountID:
    Type: String
    Description: AWS account ID where CUDly runs (the account allowed to assume this role).
    AllowedPattern: "^[0-9]{12}$"

  ExternalID:
    Type: String
    Description: >
      Random string used as the sts:ExternalId condition to prevent confused-deputy
      attacks. Generate a UUID and share it securely with the source account.
    MinLength: 8
    NoEcho: true

  RoleName:
    Type: String
    Description: Name of the IAM role CUDly will assume.
    Default: CUDly-CrossAccount

  CUDlyAPIURL:
    Type: String
    Description: CUDly API base URL for automatic account registration. Leave empty to skip.
    Default: ""

  ContactEmail:
    Type: String
    Description: Contact email for registration. Required when CUDlyAPIURL is set.
    Default: ""

  AccountName:
    Type: String
    Description: Human-readable name for this account in CUDly.
    Default: ""

Conditions:
  DoRegister: !And
    - !Not [!Equals [!Ref CUDlyAPIURL, ""]]
    - !Not [!Equals [!Ref ContactEmail, ""]]

Resources:
  CUDlyPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${RoleName}-Policy"
      Description: Permissions required by CUDly to purchase and manage AWS commitments
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: EC2Reservations
            Effect: Allow
            Action:
              - ec2:PurchaseReservedInstancesOffering
              - ec2:DescribeReservedInstancesOfferings
              - ec2:DescribeReservedInstances
              - ec2:DescribeInstanceTypeOfferings
              - ec2:GetReservedInstancesExchangeQuote
              - ec2:AcceptReservedInstancesExchangeQuote
              - ec2:DescribeRegions
            Resource: "*"
          - Sid: RDSReservations
            Effect: Allow
            Action:
              - rds:PurchaseReservedDBInstancesOffering
              - rds:DescribeReservedDBInstancesOfferings
              - rds:DescribeReservedDBInstances
            Resource: "*"
          - Sid: ElastiCacheReservations
            Effect: Allow
            Action:
              - elasticache:PurchaseReservedCacheNodesOffering
              - elasticache:DescribeReservedCacheNodesOfferings
              - elasticache:DescribeReservedCacheNodes
            Resource: "*"
          - Sid: RedshiftReservations
            Effect: Allow
            Action:
              - redshift:PurchaseReservedNodeOffering
              - redshift:DescribeReservedNodeOfferings
              - redshift:DescribeReservedNodes
            Resource: "*"
          - Sid: MemoryDBReservations
            Effect: Allow
            Action:
              - memorydb:PurchaseReservedNodesOffering
              - memorydb:DescribeReservedNodesOfferings
              - memorydb:DescribeReservedNodes
            Resource: "*"
          - Sid: SavingsPlans
            Effect: Allow
            Action:
              - savingsplans:CreateSavingsPlan
              - savingsplans:DescribeSavingsPlans
              - savingsplans:DescribeSavingsPlansOfferings
              - savingsplans:DescribeSavingsPlansOfferingRates
            Resource: "*"
          - Sid: OpenSearchReservations
            Effect: Allow
            Action:
              - es:PurchaseReservedInstanceOffering
              - es:DescribeReservedInstanceOfferings
              - es:DescribeReservedInstances
            Resource: "*"

  CUDlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      Description: Role assumed by CUDly via cross-account IAM role assumption
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${SourceAccountID}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalID
      ManagedPolicyArns:
        - !Ref CUDlyPolicy

  # --- Auto-registration (optional, gated on CUDlyAPIURL + ContactEmail) ---

  RegistrationLambdaRole:
    Type: AWS::IAM::Role
    Condition: DoRegister
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  RegistrationLambda:
    Type: AWS::Lambda::Function
    Condition: DoRegister
    Properties:
      FunctionName: !Sub "${RoleName}-register"
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt RegistrationLambdaRole.Arn
      Code:
        ZipFile: |
          import json, urllib.request, urllib.error
          import cfnresponse

          def handler(event, context):
              if event["RequestType"] in ("Update", "Delete"):
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return

              props = event["ResourceProperties"]
              body = json.dumps({
                  "provider": "aws",
                  "external_id": props["AccountID"],
                  "account_name": props.get("AccountName") or ("AWS " + props["AccountID"]),
                  "contact_email": props["ContactEmail"],
                  "aws_auth_mode": "role_arn",
                  "aws_role_arn": props["RoleARN"],
                  "aws_external_id": props["AWSExternalID"],
              }).encode()

              url = props["CUDlyAPIURL"].rstrip("/") + "/api/register"
              req = urllib.request.Request(url, data=body, headers={"Content-Type": "application/json"})
              try:
                  resp = urllib.request.urlopen(req, timeout=15)
                  result = json.loads(resp.read())
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      "ReferenceToken": result.get("reference_token", ""),
                      "Status": result.get("status", ""),
                  })
              except urllib.error.HTTPError as e:
                  body_text = e.read().decode()
                  if e.code == 409:
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                          "Status": "already_pending",
                      })
                  else:
                      cfnresponse.send(event, context, cfnresponse.FAILED, {},
                          reason="HTTP {}: {}".format(e.code, body_text[:200]))
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {},
                      reason=str(e)[:200])

  CUDlyRegistration:
    Type: Custom::CUDlyRegistration
    Condition: DoRegister
    DependsOn: CUDlyRole
    Properties:
      ServiceToken: !GetAtt RegistrationLambda.Arn
      CUDlyAPIURL: !Ref CUDlyAPIURL
      ContactEmail: !Ref ContactEmail
      AccountName: !Ref AccountName
      AccountID: !Ref AWS::AccountId
      RoleARN: !GetAtt CUDlyRole.Arn
      AWSExternalID: !Ref ExternalID

Outputs:
  RoleARN:
    Description: ARN of the CUDly IAM role — use as aws_role_arn in CUDly account registration
    Value: !GetAtt CUDlyRole.Arn

  CUDlyAccountRegistration:
    Description: Values to use when registering this account in CUDly
    Value: !Sub |
      provider      : aws
      aws_auth_mode : role_arn
      external_id   : ${AWS::AccountId}
      aws_role_arn  : ${CUDlyRole.Arn}

  RegistrationStatus:
    Condition: DoRegister
    Description: CUDly registration status
    Value: !GetAtt CUDlyRegistration.Status
