AWSTemplateFormatVersion: "2010-09-09"
Description: >
  IAM OIDC Identity Provider and role for CUDly workload identity federation.
  Deploy this in the target AWS account to allow CUDly running on Azure or GCP
  to assume the role without long-lived credentials.

Parameters:
  OIDCIssuerURL:
    Type: String
    Description: >
      Full OIDC issuer URL (with https://) — used for the IAM OIDC provider Url property.
      Azure AD: https://login.microsoftonline.com/<tenant_id>/v2.0
      GCP:      https://accounts.google.com
    AllowedPattern: "https://.*"

  OIDCIssuerHost:
    Type: String
    Description: >
      OIDC issuer host and path WITHOUT the https:// prefix — used as the IAM condition key.
      AWS IAM condition keys strip the scheme, so this must match exactly.
      Azure AD: login.microsoftonline.com/<tenant_id>/v2.0
      GCP:      accounts.google.com
    AllowedPattern: "^[^/].*"

  OIDCAudience:
    Type: String
    Description: >
      Expected audience (aud) in the incoming OIDC token.
      Azure: api://<client_id>  or  <client_id>
      GCP:   https://iam.googleapis.com/projects/<project_number>/locations/global/workloadIdentityPools/<pool_id>/providers/<provider_id>
    Default: ""

  OIDCThumbprint:
    Type: String
    Description: >
      SHA-1 thumbprint of the OIDC provider root CA certificate.
      For GCP (accounts.google.com) use: 08745487e891c19e3078c1f2a07e452950ef36f6
      For Azure AD use the thumbprint of the DigiCert Global Root CA.
      Leave as zeros only for well-known providers where AWS auto-validates the chain.
    Default: "0000000000000000000000000000000000000000"
    AllowedPattern: "^[0-9a-fA-F]{40}$"

  OIDCSubjectClaim:
    Type: String
    Description: >
      Optional subject (sub) claim to restrict which identity can assume the role.
      Leave empty to allow any authenticated subject from this issuer.
    Default: ""

  RoleName:
    Type: String
    Description: Name of the IAM role CUDly will assume.
    Default: CUDly-WIF

Conditions:
  HasAudience: !Not [!Equals [!Ref OIDCAudience, ""]]
  HasSubject: !Not [!Equals [!Ref OIDCSubjectClaim, ""]]

Resources:
  OIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: !Ref OIDCIssuerURL
      ClientIdList:
        - !If [HasAudience, !Ref OIDCAudience, sts.amazonaws.com]
      ThumbprintList:
        - !Ref OIDCThumbprint

  CUDlyPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${RoleName}-Policy"
      Description: Permissions required by CUDly to purchase and manage AWS commitments
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: EC2Reservations
            Effect: Allow
            Action:
              - ec2:PurchaseReservedInstancesOffering
              - ec2:DescribeReservedInstancesOfferings
              - ec2:DescribeReservedInstances
              - ec2:DescribeInstanceTypeOfferings
              - ec2:GetReservedInstancesExchangeQuote
              - ec2:AcceptReservedInstancesExchangeQuote
              - ec2:DescribeRegions
            Resource: "*"
          - Sid: RDSReservations
            Effect: Allow
            Action:
              - rds:PurchaseReservedDBInstancesOffering
              - rds:DescribeReservedDBInstancesOfferings
              - rds:DescribeReservedDBInstances
            Resource: "*"
          - Sid: ElastiCacheReservations
            Effect: Allow
            Action:
              - elasticache:PurchaseReservedCacheNodesOffering
              - elasticache:DescribeReservedCacheNodesOfferings
              - elasticache:DescribeReservedCacheNodes
            Resource: "*"
          - Sid: RedshiftReservations
            Effect: Allow
            Action:
              - redshift:PurchaseReservedNodeOffering
              - redshift:DescribeReservedNodeOfferings
              - redshift:DescribeReservedNodes
            Resource: "*"
          - Sid: MemoryDBReservations
            Effect: Allow
            Action:
              - memorydb:PurchaseReservedNodesOffering
              - memorydb:DescribeReservedNodesOfferings
              - memorydb:DescribeReservedNodes
            Resource: "*"
          - Sid: SavingsPlans
            Effect: Allow
            Action:
              - savingsplans:CreateSavingsPlan
              - savingsplans:DescribeSavingsPlans
              - savingsplans:DescribeSavingsPlansOfferings
              - savingsplans:DescribeSavingsPlansOfferingRates
            Resource: "*"
          - Sid: OpenSearchReservations
            Effect: Allow
            Action:
              - es:PurchaseReservedInstanceOffering
              - es:DescribeReservedInstanceOfferings
              - es:DescribeReservedInstances
            Resource: "*"

  CUDlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      Description: Role assumed by CUDly via workload identity federation
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          # Use Fn::If to conditionally include :sub restriction alongside :aud
          - !If
            - HasSubject
            - Effect: Allow
              Principal:
                Federated: !GetAtt OIDCProvider.Arn
              Action: sts:AssumeRoleWithWebIdentity
              Condition:
                StringEquals:
                  !Sub "${OIDCIssuerHost}:aud":
                    !If [HasAudience, !Ref OIDCAudience, sts.amazonaws.com]
                  !Sub "${OIDCIssuerHost}:sub": !Ref OIDCSubjectClaim
            - Effect: Allow
              Principal:
                Federated: !GetAtt OIDCProvider.Arn
              Action: sts:AssumeRoleWithWebIdentity
              Condition:
                StringEquals:
                  !Sub "${OIDCIssuerHost}:aud":
                    !If [HasAudience, !Ref OIDCAudience, sts.amazonaws.com]
      ManagedPolicyArns:
        - !Ref CUDlyPolicy

Outputs:
  RoleARN:
    Description: ARN of the CUDly IAM role — use as aws_role_arn in CUDly account registration
    Value: !GetAtt CUDlyRole.Arn

  OIDCProviderARN:
    Description: ARN of the created OIDC identity provider
    Value: !GetAtt OIDCProvider.Arn

  CUDlyAccountRegistration:
    Description: Values to use when registering this account in CUDly
    Value: !Sub |
      provider               : aws
      aws_auth_mode          : workload_identity_federation
      external_id            : ${AWS::AccountId}
      aws_role_arn           : ${CUDlyRole.Arn}
      aws_web_identity_token_file : /var/run/secrets/token  (or set AWS_WEB_IDENTITY_TOKEN_FILE)
