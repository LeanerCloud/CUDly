name: Post-Deploy Smoke Test

on:
  workflow_run:
    workflows:
      - "Deploy to AWS Lambda"
      - "Deploy to Azure Container Apps"
      - "Deploy to GCP Cloud Run"
    types: [completed]
    branches: [main, feat/multicloud-web-frontend]

permissions:
  id-token: write
  contents: read

jobs:
  smoke-test:
    name: Test all enabled accounts
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Precheck secrets
        id: precheck
        env:
          AWS_ROLE: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          LAMBDA_FUNCTION: ${{ vars.CUDLY_LAMBDA_FUNCTION_NAME }}
          API_KEY_SECRET_ARN: ${{ secrets.CUDLY_API_KEY_SECRET_ARN }}
        run: |
          if [[ -z "${AWS_ROLE}" || -z "${LAMBDA_FUNCTION}" || -z "${API_KEY_SECRET_ARN}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Smoke test skipped — missing AWS_ROLE_TO_ASSUME, CUDLY_LAMBDA_FUNCTION_NAME, or CUDLY_API_KEY_SECRET_ARN"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials via OIDC
        if: steps.precheck.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
          role-session-name: cudly-smoke-test

      - name: Resolve CUDly URL and API key
        if: steps.precheck.outputs.skip != 'true'
        id: resolve
        env:
          LAMBDA_FUNCTION: ${{ vars.CUDLY_LAMBDA_FUNCTION_NAME }}
          API_KEY_SECRET_ARN: ${{ secrets.CUDLY_API_KEY_SECRET_ARN }}
        run: |
          CUDLY_URL=$(aws lambda get-function-url-config \
            --function-name "${LAMBDA_FUNCTION}" \
            --query 'FunctionUrl' --output text)
          CUDLY_URL="${CUDLY_URL%/}"
          echo "url=${CUDLY_URL}" >> "$GITHUB_OUTPUT"

          CUDLY_API_KEY=$(aws secretsmanager get-secret-value \
            --secret-id "${API_KEY_SECRET_ARN}" \
            --query SecretString --output text)
          echo "::add-mask::${CUDLY_API_KEY}"
          echo "api_key=${CUDLY_API_KEY}" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment to settle
        if: steps.precheck.outputs.skip != 'true'
        run: sleep 15

      - name: Health check
        if: steps.precheck.outputs.skip != 'true'
        run: |
          URL="${{ steps.resolve.outputs.url }}"
          for i in 1 2 3 4 5; do
            if curl -fsSL "${URL}/health" > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt ${i}/5 — waiting 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 5 attempts"
          exit 1

      - name: Test all enabled accounts
        if: steps.precheck.outputs.skip != 'true'
        env:
          CUDLY_URL: ${{ steps.resolve.outputs.url }}
          CUDLY_API_KEY: ${{ steps.resolve.outputs.api_key }}
        run: |
          ACCOUNTS=$(curl -fsSL -H "X-API-Key: ${CUDLY_API_KEY}" "${CUDLY_URL}/api/accounts")
          ENABLED=$(echo "${ACCOUNTS}" | jq -c '[.[] | select(.enabled == true)]')
          COUNT=$(echo "${ENABLED}" | jq 'length')
          echo "Found ${COUNT} enabled account(s)"

          if [[ "${COUNT}" -eq 0 ]]; then
            echo "::notice::No enabled accounts to test — skipping"
            exit 0
          fi

          FAILED=0
          for row in $(echo "${ENABLED}" | jq -r '.[] | @base64'); do
            ACCT=$(echo "${row}" | base64 -d)
            ID=$(echo "${ACCT}" | jq -r '.id')
            NAME=$(echo "${ACCT}" | jq -r '.name')
            PROVIDER=$(echo "${ACCT}" | jq -r '.provider')

            echo "--- Testing ${NAME} (${PROVIDER}, ${ID}) ---"
            RESP=$(curl -sS -w "\n%{http_code}" \
              -X POST "${CUDLY_URL}/api/accounts/${ID}/test" \
              -H "X-API-Key: ${CUDLY_API_KEY}")
            HTTP_CODE=$(echo "${RESP}" | tail -1)
            BODY=$(echo "${RESP}" | head -n -1)

            OK=$(echo "${BODY}" | jq -r '.ok // false')
            MSG=$(echo "${BODY}" | jq -r '.message // "no message"')

            if [[ "${OK}" == "true" ]]; then
              echo "PASS: ${MSG}"
            else
              echo "::error::FAIL (${NAME}): HTTP ${HTTP_CODE} — ${MSG}"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "=== Summary: $((COUNT - FAILED))/${COUNT} passed ==="
          if [[ "${FAILED}" -gt 0 ]]; then
            exit 1
          fi
