name: Azure Sanity (Read-only Dry Run)

on:
  pull_request:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  sanity:
    if: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' }}
    runs-on: ubuntu-latest
    env:
      REPORT_PATH: azure_sanity_report.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build + Run Azure sanity
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          go test ./... -count=1
          go build -o azure-sanity ./ci_cd_sanity_tests/cmd/azure_sanity
          ./azure-sanity \
            --subscription-id "${AZURE_SUBSCRIPTION_ID}" \
            --expected-subscription "${AZURE_SUBSCRIPTION_ID}" \
            --out "${REPORT_PATH}"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-sanity-report
          path: ${{ env.REPORT_PATH }}
