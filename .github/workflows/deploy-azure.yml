# Deploy to Azure Container Apps
#
# This workflow deploys the CUDly application to Azure Container Apps.
# Serverless container platform with automatic scaling and built-in HTTPS.
#
# Required GitHub Secrets:
#   - AZURE_CLIENT_ID: App registration client ID for OIDC keyless auth
#   - AZURE_TENANT_ID: Azure AD tenant ID for OIDC keyless auth
#   - AZURE_SUBSCRIPTION_ID: Azure subscription ID
#   - ADMIN_EMAIL: Admin email for notifications
#
# Required GitHub Variables:
#   - AZURE_LOCATION: Azure region (e.g., eastus)
#   - ACR_NAME: Azure Container Registry name
#   - RESOURCE_GROUP: Azure resource group name
#   - KEY_VAULT_NAME: Azure Key Vault name
#
# Triggered by:
#   - Pushes to main or feat/multicloud-web-frontend branch
#   - Manual workflow dispatch
#   - Workflow call from deploy-all.yml

name: Deploy to Azure Container Apps

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [main, feat/multicloud-web-frontend]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        type: choice
        options: [dev, staging, prod]
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

env:
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus' }}
  ACR_NAME: ${{ vars.ACR_NAME || 'cudlyacr' }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP || 'cudly-rg' }}
  TF_VERSION: '1.6.0'

jobs:
  # Build and push Docker image to ACR
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: azure-${{ inputs.environment }}
      url: ${{ steps.deploy.outputs.app_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        run: |
          IMAGE_URI="${{ env.ACR_NAME }}.azurecr.io/cudly:${{ github.sha }}"
          echo "Building image: $IMAGE_URI"

          # Azure Container Apps uses x86_64 (amd64) architecture
          docker buildx build \
            --platform linux/amd64 \
            --build-arg VERSION=${{ github.sha }} \
            -t $IMAGE_URI \
            --push \
            .

          echo "Pushing image to Azure Container Registry..."

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          cd terraform/environments/azure
          terraform init

      - name: Terraform Plan
        env:
          TF_VAR_admin_email: ${{ secrets.ADMIN_EMAIL }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_key_vault_name: ${{ vars.KEY_VAULT_NAME }}
        run: |
          cd terraform/environments/azure
          terraform plan \
            -var-file="github-${{ inputs.environment }}.tfvars" \
            -var="image_uri=${{ env.IMAGE_URI }}" \
            -var="resource_group=${{ env.RESOURCE_GROUP }}" \
            -var="location=${{ env.AZURE_LOCATION }}" \
            -out=tfplan

      - name: Terraform Apply
        id: deploy
        env:
          TF_VAR_admin_email: ${{ secrets.ADMIN_EMAIL }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_key_vault_name: ${{ vars.KEY_VAULT_NAME }}
        run: |
          cd terraform/environments/azure
          terraform apply -auto-approve tfplan

          # Get app URL
          APP_URL=$(terraform output -raw app_url 2>/dev/null || echo "")
          echo "app_url=$APP_URL" >> $GITHUB_OUTPUT

          # Get app name
          APP_NAME=$(terraform output -raw container_app_name 2>/dev/null || echo "")
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

      - name: Save deployment info
        run: |
          cat <<EOF > deployment-info.json
          {
            "environment": "${{ inputs.environment }}",
            "image_uri": "${{ env.IMAGE_URI }}",
            "app_url": "${{ steps.deploy.outputs.app_url }}",
            "app_name": "${{ steps.deploy.outputs.app_name }}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "deployed_by": "${{ github.actor }}",
            "commit": "${{ github.sha }}"
          }
          EOF
          cat deployment-info.json

      - name: Upload deployment info
        uses: actions/upload-artifact@v4
        with:
          name: deployment-info-azure-${{ inputs.environment }}
          path: deployment-info.json
          retention-days: 90

  # Test the deployment
  test-deployment:
    name: Test Deployment
    runs-on: ubuntu-latest
    needs: build-and-deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          cd terraform/environments/azure
          terraform init

      - name: Get Container App URL
        id: get-url
        run: |
          cd terraform/environments/azure
          APP_URL=$(terraform output -raw app_url 2>/dev/null || echo "")
          if [ -z "$APP_URL" ]; then
            echo "Failed to get app URL"
            exit 1
          fi
          echo "url=$APP_URL" >> $GITHUB_OUTPUT

      - name: Wait for Container App to be ready
        run: |
          echo "Waiting 45 seconds for Container App to be ready..."
          sleep 45

      - name: Test health endpoint
        run: |
          URL="${{ steps.get-url.outputs.url }}"
          echo "Testing health endpoint: https://$URL/health"

          for i in {1..10}; do
            if curl -f -s "https://$URL/health" > /dev/null; then
              echo "✅ Health check passed!"

              # Test response content
              RESPONSE=$(curl -s "https://$URL/health")
              echo "Response: $RESPONSE"

              if echo "$RESPONSE" | grep -q '"status"'; then
                echo "✅ Health endpoint returns valid JSON"
                exit 0
              fi
            fi
            echo "Attempt $i failed, retrying in 10 seconds..."
            sleep 10
          done

          echo "❌ Health check failed after 10 attempts"
          exit 1

      - name: Run smoke tests
        run: |
          URL="${{ steps.get-url.outputs.url }}"

          echo "Running basic smoke tests..."

          # Test health endpoint multiple times
          for i in {1..3}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$URL/health")
            if [ "$STATUS" -eq 200 ]; then
              echo "✅ Health check $i: passed (HTTP $STATUS)"
            else
              echo "❌ Health check $i: failed (HTTP $STATUS)"
              exit 1
            fi
            sleep 2
          done

          echo "✅ All smoke tests passed!"

      - name: Check Container App logs
        run: |
          APP_NAME="${{ needs.build-and-deploy.outputs.app_name }}"
          if [ -n "$APP_NAME" ]; then
            echo "Recent Container App logs:"
            az containerapp logs show \
              --name $APP_NAME \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --tail 50 || true
          fi

  # Post deployment summary
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-and-deploy, test-deployment]
    if: always()

    steps:
      - name: Download deployment info
        uses: actions/download-artifact@v4
        with:
          name: deployment-info-azure-${{ inputs.environment }}
        continue-on-error: true

      - name: Post summary
        run: |
          echo "## Azure Container Apps Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Location:** ${{ env.AZURE_LOCATION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f deployment-info.json ]; then
            echo "### Deployment Details" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
            cat deployment-info.json >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Results" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy: ${{ needs.build-and-deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Test: ${{ needs.test-deployment.result }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.build-and-deploy.result }}" == "success" ] && [ "${{ needs.test-deployment.result }}" == "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Deployment successful!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **Deployment failed. Check logs for details.**" >> $GITHUB_STEP_SUMMARY
          fi
