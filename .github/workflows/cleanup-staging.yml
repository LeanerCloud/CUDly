# Cleanup Staging Resources (one-off)
#
# Destroys all resources tracked in the staging Terraform state files.
# Run this once after switching the default pipeline environment to 'dev'.
#
# Required GitHub Secrets (same as deploy workflows):
#   - TF_BACKEND_AWS, TF_BACKEND_AZURE, TF_BACKEND_GCP
#   - ADMIN_EMAIL
#   - AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#
# Required GitHub Variables:
#   - AWS_REGION, AWS_ROLE_TO_ASSUME
#   - GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT

name: Cleanup Staging Resources

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm destruction of ALL staging resources'
        required: true

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: '1.10.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  guard:
    name: Confirm Destruction
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          if [ "$CONFIRM" != "destroy" ]; then
            echo "You must type 'destroy' exactly to confirm. Got: '$CONFIRM'"
            exit 1
          fi
          echo "Confirmation accepted. Proceeding with staging resource destruction."

  destroy-aws-lambda:
    name: Destroy AWS Lambda (staging)
    runs-on: ubuntu-24.04-arm
    needs: guard
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (staging state)
        env:
          TF_BACKEND: ${{ secrets.TF_BACKEND_AWS }}
        run: |
          printf '%s\nkey = "github-staging/terraform.tfstate"\n' "$TF_BACKEND" > /tmp/backend.tfbackend
          cd terraform/environments/aws
          terraform init -backend-config=/tmp/backend.tfbackend

      - name: Empty ECR repositories before destroy
        run: |
          # Force-delete all staging ECR repos (known names + state-derived random-suffix name)
          for REPO_NAME in cudly-staging cudly; do
            if aws ecr delete-repository --repository-name "$REPO_NAME" --force 2>/dev/null; then
              echo "Deleted ECR repo $REPO_NAME"
            else
              echo "Repo $REPO_NAME not found or already deleted, skipping"
            fi
          done
          # Also try to find the staging ECR repo from state (has random suffix)
          REPO_NAME=$(cd terraform/environments/aws && \
            terraform output -raw ecr_repository_name 2>/dev/null || echo "")
          if [ -n "$REPO_NAME" ] && [ "$REPO_NAME" != "cudly-staging" ] && [ "$REPO_NAME" != "cudly" ]; then
            if aws ecr delete-repository --repository-name "$REPO_NAME" --force 2>/dev/null; then
              echo "Deleted ECR repo $REPO_NAME"
            else
              echo "Repo $REPO_NAME not found or already deleted, skipping"
            fi
          fi

      - name: Disable RDS deletion protection before destroy
        run: |
          for INSTANCE_ID in $(aws rds describe-db-instances \
            --query "DBInstances[?starts_with(DBInstanceIdentifier,'cudly-staging')].DBInstanceIdentifier" \
            --output text 2>/dev/null); do
            echo "Disabling deletion protection on $INSTANCE_ID..."
            aws rds modify-db-instance --db-instance-identifier "$INSTANCE_ID" \
              --no-deletion-protection --apply-immediately 2>/dev/null || true
          done

      - name: Terraform Destroy
        env:
          TF_VAR_admin_email: ${{ secrets.ADMIN_EMAIL }}
        run: |
          cd terraform/environments/aws
          terraform destroy \
            -var-file="github-staging.tfvars" \
            -var="compute_platform=lambda" \
            -auto-approve

  destroy-aws-fargate:
    name: Destroy AWS Fargate (staging)
    runs-on: ubuntu-24.04-arm
    needs: guard
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (staging state)
        env:
          TF_BACKEND: ${{ secrets.TF_BACKEND_AWS }}
        run: |
          printf '%s\nkey = "github-fargate-staging/terraform.tfstate"\n' "$TF_BACKEND" > /tmp/backend.tfbackend
          cd terraform/environments/aws
          terraform init -backend-config=/tmp/backend.tfbackend

      - name: Empty ECR repository before destroy
        run: |
          # Force-delete ECR repo from state (has random suffix)
          REPO_NAME=$(cd terraform/environments/aws && \
            terraform output -raw ecr_repository_name 2>/dev/null || echo "")
          if [ -n "$REPO_NAME" ]; then
            if aws ecr delete-repository --repository-name "$REPO_NAME" --force 2>/dev/null; then
              echo "Deleted ECR repo $REPO_NAME"
            else
              echo "Repo $REPO_NAME not found or already deleted, skipping"
            fi
          fi

      - name: Disable RDS deletion protection before destroy
        run: |
          for INSTANCE_ID in $(aws rds describe-db-instances \
            --query "DBInstances[?starts_with(DBInstanceIdentifier,'cudly-staging')].DBInstanceIdentifier" \
            --output text 2>/dev/null); do
            echo "Disabling deletion protection on $INSTANCE_ID..."
            aws rds modify-db-instance --db-instance-identifier "$INSTANCE_ID" \
              --no-deletion-protection --apply-immediately 2>/dev/null || true
          done

      - name: Terraform Destroy
        env:
          TF_VAR_admin_email: ${{ secrets.ADMIN_EMAIL }}
        run: |
          cd terraform/environments/aws
          terraform destroy \
            -var-file="github-staging.tfvars" \
            -var="compute_platform=fargate" \
            -auto-approve

  destroy-azure:
    name: Destroy Azure (staging)
    runs-on: ubuntu-latest
    needs: guard
    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Break stale Azure state lock
        env:
          TF_BACKEND: ${{ secrets.TF_BACKEND_AZURE }}
        run: |
          printf '%s\nkey = "github-staging.terraform.tfstate"\n' "$TF_BACKEND" > /tmp/backend.tfbackend
          STORAGE_ACCOUNT=$(grep -E '^\s*storage_account_name\s*=' /tmp/backend.tfbackend 2>/dev/null | tr -d ' "' | cut -d= -f2)
          CONTAINER=$(grep -E '^\s*container_name\s*=' /tmp/backend.tfbackend 2>/dev/null | tr -d ' "' | cut -d= -f2)
          RESOURCE_GROUP=$(grep -E '^\s*resource_group_name\s*=' /tmp/backend.tfbackend 2>/dev/null | tr -d ' "' | cut -d= -f2)
          STATE_KEY="github-staging.terraform.tfstate"
          if [ -n "$STORAGE_ACCOUNT" ] && [ -n "$CONTAINER" ]; then
            ACCOUNT_KEY=$(az storage account keys list \
              --account-name "${STORAGE_ACCOUNT}" \
              ${RESOURCE_GROUP:+--resource-group "${RESOURCE_GROUP}"} \
              --query '[0].value' -o tsv 2>/dev/null || echo "")
            if [ -n "$ACCOUNT_KEY" ]; then
              az storage blob lease break \
                --account-name "${STORAGE_ACCOUNT}" \
                --container-name "${CONTAINER}" \
                --blob-name "${STATE_KEY}" \
                --account-key "${ACCOUNT_KEY}" 2>/dev/null || echo "No lease to break (clean)"
            fi
          fi

      - name: Terraform Init (staging state)
        run: |
          cd terraform/environments/azure
          terraform init -backend-config=/tmp/backend.tfbackend

      - name: Terraform Destroy
        env:
          TF_VAR_admin_email: ${{ secrets.ADMIN_EMAIL }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          cd terraform/environments/azure
          terraform destroy \
            -var-file="github-staging.tfvars" \
            -var="location=eastus" \
            -auto-approve

  destroy-gcp:
    name: Destroy GCP (staging)
    runs-on: ubuntu-latest
    needs: guard
    env:
      GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (staging state)
        env:
          TF_BACKEND: ${{ secrets.TF_BACKEND_GCP }}
        run: |
          printf '%s\nprefix = "github-staging"\n' "$TF_BACKEND" > /tmp/backend.tfbackend
          cd terraform/environments/gcp
          terraform init -backend-config=/tmp/backend.tfbackend

      - name: Delete Cloud SQL instance directly (avoids user/DB ordering deadlock)
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
        run: |
          PROJECT="${{ vars.GCP_PROJECT_ID }}"
          # Find and delete the staging Cloud SQL instance to avoid PostgreSQL dependency errors
          INSTANCE=$(gcloud sql instances list --project="$PROJECT" \
            --filter="name:cudly-staging" --format="value(name)" 2>/dev/null | head -1)
          if [ -n "$INSTANCE" ]; then
            echo "Deleting Cloud SQL instance $INSTANCE..."
            gcloud sql instances delete "$INSTANCE" --project="$PROJECT" --quiet || true
            # Wait for deletion to complete (Service Networking Connection can't be removed until Cloud SQL is gone)
            echo "Waiting for Cloud SQL instance to be fully deleted..."
            for i in $(seq 1 30); do
              if ! gcloud sql instances describe "$INSTANCE" --project="$PROJECT" --quiet 2>/dev/null; then
                echo "Cloud SQL instance $INSTANCE deleted."
                break
              fi
              echo "Still deleting... ($i/30)"
              sleep 15
            done
          fi
          # Remove Cloud SQL resources from Terraform state so destroy doesn't try to delete them again
          cd terraform/environments/gcp
          terraform state rm google_sql_database_instance.main 2>/dev/null || true
          terraform state rm google_sql_database.main 2>/dev/null || true
          terraform state rm google_sql_user.main 2>/dev/null || true
          # Remove the Service Networking Connection from state and delete directly
          # GCP needs extra time after Cloud SQL deletion to release VPC peering
          terraform state rm module.networking.google_service_networking_connection.private_vpc_connection 2>/dev/null || true
          gcloud services vpc-peerings delete \
            --service=servicenetworking.googleapis.com \
            --network=cudly-staging-vpc \
            --project="$PROJECT" --quiet 2>/dev/null || echo "VPC peering already gone or not found"

      - name: Terraform Destroy
        env:
          TF_VAR_admin_email: ${{ secrets.ADMIN_EMAIL }}
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
        run: |
          cd terraform/environments/gcp
          terraform destroy \
            -var-file="github-staging.tfvars" \
            -auto-approve
