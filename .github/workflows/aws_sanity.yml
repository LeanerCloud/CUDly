name: AWS Sanity (Read-only Dry Run)

on:
  pull_request:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  sanity:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      REPORT_PATH: sanity_report.json
      EXPECTED_ACCOUNT: ${{ secrets.AWS_EXPECTED_ACCOUNT_ID }} # change per test account
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Configure AWS credentials via OIDC (read-only role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_READONLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build
        run: |
          go test ./... -count=1
          go build -o sanity ./ci_cd_sanity_tests/cmd/sanity

      - name: Run sanity (read-only)
        run: |
          ./sanity \
            --region "${AWS_REGION}" \
            --expected-account "${EXPECTED_ACCOUNT}" \
            --out "${REPORT_PATH}"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: aws-sanity-report
          path: ${{ env.REPORT_PATH }}
