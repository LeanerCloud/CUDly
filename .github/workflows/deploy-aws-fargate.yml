# Deploy to AWS ECS Fargate
#
# This workflow deploys the CUDly application to AWS ECS Fargate with ALB.
# Alternative to Lambda for always-on containerized workloads.
#
# Required GitHub Secrets:
#   - ADMIN_EMAIL: Admin email for notifications
#
# Required GitHub Variables:
#   - AWS_REGION: AWS region
#   - AWS_ROLE_TO_ASSUME: IAM role ARN for OIDC keyless auth
#   - ECR_REPOSITORY: ECR repository name
#
# Triggered by:
#   - Pushes to main or feat/multicloud-web-frontend branch
#   - Manual workflow dispatch
#   - Workflow call from deploy-all.yml

name: Deploy to AWS Fargate

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-fargate-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [main, feat/multicloud-web-frontend]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        type: choice
        options: [dev, staging, prod]
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      image_uri:
        required: false
        type: string

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'cudly' }}
  TF_VERSION: '1.10.0'

jobs:
  # Determine deployment environment
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      image_tag: ${{ steps.set-tag.outputs.tag }}

    steps:
      - name: Determine environment
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Set image tag
        id: set-tag
        run: |
          echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

  # Build and push Docker image if not provided
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-24.04-arm  # ARM runner: Docker build targets linux/arm64 (Fargate Graviton2)
    needs: prepare
    if: inputs.image_uri == ''
    outputs:
      image_uri: ${{ steps.set-uri.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,prefix=${{ needs.prepare.outputs.environment }}-
            type=raw,value=${{ needs.prepare.outputs.environment }}-latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/arm64
          build-args: |
            VERSION=${{ github.sha }}

      - name: Set image URI output
        id: set-uri
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ENVIRONMENT: ${{ needs.prepare.outputs.environment }}
        run: |
          IMAGE_URI="${REGISTRY}/${ECR_REPOSITORY}:${ENVIRONMENT}-${{ github.sha }}"
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  # Deploy with Terraform
  deploy:
    name: Deploy to Fargate
    runs-on: ubuntu-24.04-arm
    needs: [prepare, build-and-push]
    if: always() && !cancelled() && !failure()
    outputs:
      alb_url: ${{ steps.outputs.outputs.alb_url }}
      service_name: ${{ steps.outputs.outputs.service_name }}
    environment:
      name: aws-fargate-${{ needs.prepare.outputs.environment }}
      url: ${{ steps.outputs.outputs.alb_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        env:
          TF_BACKEND: ${{ secrets.TF_BACKEND_AWS }}
          ENVIRONMENT: ${{ needs.prepare.outputs.environment }}
        run: |
          printf '%s\nkey = "github-fargate-%s/terraform.tfstate"\n' "$TF_BACKEND" "$ENVIRONMENT" > /tmp/backend.tfbackend
          cd terraform/environments/aws
          terraform init -backend-config=/tmp/backend.tfbackend

      - name: Terraform Plan
        env:
          TF_VAR_admin_email: ${{ secrets.ADMIN_EMAIL }}
          ENVIRONMENT: ${{ needs.prepare.outputs.environment }}
        run: |
          cd terraform/environments/aws
          terraform plan \
            -var-file="github-${ENVIRONMENT}.tfvars" \
            -var="image_uri=${{ needs.build-and-push.outputs.image_uri || inputs.image_uri }}" \
            -var="compute_platform=fargate" \
            -out=tfplan

      - name: Terraform Apply
        env:
          TF_VAR_admin_email: ${{ secrets.ADMIN_EMAIL }}
        run: |
          cd terraform/environments/aws
          terraform apply -auto-approve tfplan

      - name: Release state lock on failure
        if: failure() || cancelled()
        env:
          ENVIRONMENT: ${{ needs.prepare.outputs.environment }}
        run: |
          BUCKET=$(grep -E '^\s*bucket\s*=' /tmp/backend.tfbackend 2>/dev/null | tr -d ' "' | cut -d= -f2)
          if [ -n "$BUCKET" ]; then
            LOCK_KEY="github-fargate-${ENVIRONMENT}/terraform.tfstate.tflock"
            echo "Releasing S3 state lock: s3://${BUCKET}/${LOCK_KEY}"
            aws s3 rm "s3://${BUCKET}/${LOCK_KEY}" 2>/dev/null || echo "No lock file found (already clean)"
          fi

      - name: Get outputs
        id: outputs
        run: |
          cd terraform/environments/aws
          echo "alb_url=$(terraform output -raw alb_dns_name 2>/dev/null || echo 'N/A')" >> $GITHUB_OUTPUT
          echo "service_name=$(terraform output -raw ecs_service_name 2>/dev/null || echo 'N/A')" >> $GITHUB_OUTPUT

  # Test deployment
  test-deployment:
    name: Test Deployment
    runs-on: ubuntu-latest
    needs: [prepare, deploy]

    steps:
      - name: Wait for deployment
        run: |
          echo "Waiting 60 seconds for ECS service to stabilize..."
          sleep 60

      - name: Test health endpoint
        run: |
          ALB_URL="${{ needs.deploy.outputs.alb_url }}"
          echo "Testing health endpoint: http://$ALB_URL/health"

          for i in {1..10}; do
            if curl -f -s "http://$ALB_URL/health" > /dev/null; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10 seconds..."
            sleep 10
          done

          echo "Health check failed after 10 attempts"
          exit 1

  # Summary
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push, deploy, test-deployment]
    if: always()

    steps:
      - name: Post summary
        run: |
          echo "## AWS Fargate Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.prepare.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy Status:** ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Test Status:** ${{ needs.test-deployment.result }}" >> $GITHUB_STEP_SUMMARY
