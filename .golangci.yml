version: "2"
run:
  build-tags:
    - integration
  tests: true
linters:
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - gocyclo
    - godot
    - gosec
    - misspell
    - noctx
    - prealloc
    - revive
    - unconvert
    - unparam
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
      enabled-tags:
        - diagnostic
        - performance
        - style
    gocyclo:
      min-complexity: 15
    gosec:
      excludes:
        - G104
      severity: medium
      confidence: medium
      config:
        G101:
          ignore_entropy: false
          pattern: (?i)passwd|pass|password|pwd|secret|token
    govet:
      enable-all: true
    misspell:
      locale: US
    revive:
      rules:
        - name: var-naming
          disabled: false
        - name: package-comments
          disabled: true
        - name: exported
          disabled: false
        - name: indent-error-flow
          disabled: false
        - name: error-return
          disabled: false
        - name: error-naming
          disabled: false
        - name: error-strings
          disabled: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gocritic
          - gocyclo
          - gosec
        path: _test\.go
      - linters:
          - errcheck
          - gosec
        path: internal/testutil/
      - linters:
          - all
        path: .*_gen\.go
      - linters:
          - misspell
        path: internal/database/postgres/migrations/000078_rename_cancelled_to_canceled_test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
severity:
  default: warning
  rules:
    - linters:
        - gosec
      severity: error
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
