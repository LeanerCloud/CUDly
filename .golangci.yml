version: "2"
run:
  build-tags:
    - integration
  tests: true
linters:
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - gocyclo
    - godot
    - gosec
    - misspell
    - noctx
    - prealloc
    - revive
    - unconvert
    - unparam
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
      enabled-tags:
        - diagnostic
        - performance
        - style
    gocyclo:
      min-complexity: 15
    gosec:
      excludes:
        - G104
      severity: medium
      confidence: medium
      config:
        G101:
          ignore_entropy: false
          pattern: (?i)passwd|pass|password|pwd|secret|token
    govet:
      enable-all: true
    misspell:
      locale: US
    revive:
      rules:
        - name: var-naming
          disabled: false
        - name: package-comments
          disabled: true
        - name: exported
          disabled: false
        - name: indent-error-flow
          disabled: false
        - name: error-return
          disabled: false
        - name: error-naming
          disabled: false
        - name: error-strings
          disabled: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gocritic
          - gocyclo
          - gosec
        path: _test\.go
      - linters:
          - errcheck
          - gosec
        path: internal/testutil/
      - linters:
          - all
        path: .*_gen\.go
      # revive var-naming: "api" is an intentional package name for the HTTP API
      # layer; it is not a utility package and "avoid meaningless package names"
      # is a false positive here. All 88+ files in internal/api use this name.
      - linters:
          - revive
        path: internal/api/
        text: "avoid meaningless package names"
      # noctx: exec.Command calls in deploy/configure CLI helpers intentionally
      # omit context (CommandRunner interface contract; operator-controlled inputs).
      # Suppressed per-file rather than per-line so #nosec G204 can lead the comment.
      - linters:
          - noctx
        path: (internal/deploy/docker|cmd/configure_gcp|cmd/configure_azure)\.go
      # misspell: "cancelled" is the canonical DB column name (migration 000035).
      # Allow the double-L spelling in the config package SQL files.
      - linters:
          - misspell
        path: internal/config/(store_postgres|store_postgres_pgxmock_test|types)\.go
        text: "cancelled"
    paths:
      - third_party$
      - builtin$
      - examples$
      - node_modules
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
severity:
  default: warning
  rules:
    - linters:
        - gosec
      severity: error
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - node_modules
